<!-- VIDHI Floating Chatbot Widget - Embed this in any page with <script src="vidhi_floating_widget.js"></script> -->
<div id="vidhi-widget-container">
  <!-- Chat Toggle Button (Floating) -->
  <button id="vidhi-chat-btn" class="vidhi-chat-button" title="Ask about Indian Bills">
    <span id="vidhi-btn-icon">💬</span>
    <span id="vidhi-btn-text">Chat</span>
  </button>

  <!-- Floating Chatbot Container -->
  <div id="vidhi-chatbot" class="vidhi-chatbot-container" style="display:none;">
    <!-- Header -->
    <div class="vidhi-header">
      <div class="vidhi-header-brand">
        <h3>VIDHI</h3>
        <span>Bills Assistant</span>
      </div>
      <button id="vidhi-close-btn" class="vidhi-close-btn" title="Close chat">✕</button>
    </div>

    <!-- Messages Area -->
    <div id="vidhi-messages" class="vidhi-messages"></div>

    <!-- Input Area -->
    <div class="vidhi-input-area">
      <div class="vidhi-input-row">
        <input 
          id="vidhi-user-input" 
          type="text" 
          class="vidhi-input" 
          placeholder="Ask about bills, laws, or policies..."
          onkeypress="if(event.key==='Enter') window.vidhiWidget.handleSend()"
        />
        <button id="vidhi-send-btn" class="vidhi-send-btn" onclick="window.vidhiWidget.handleSend()">→</button>
      </div>
    </div>
  </div>

  <!-- Overlay backdrop -->
  <div id="vidhi-backdrop" class="vidhi-backdrop" style="display:none;" onclick="window.vidhiWidget.toggleChat()"></div>
</div>

<style>
:root {
  --vidhi-ink: #1a1a2e;
  --vidhi-paper: #f7f4ef;
  --vidhi-accent: #c0392b;
  --vidhi-teal: #0f6674;
  --vidhi-gold: #b8860b;
  --vidhi-border: #d4cfc6;
  --vidhi-muted: #7a7568;
}

/* ── Floating Button ── */
.vidhi-chat-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--vidhi-accent);
  color: white;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(192, 57, 43, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.vidhi-chat-button:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(192, 57, 43, 0.4);
}

.vidhi-chat-button:active {
  transform: scale(0.95);
}

.vidhi-chat-button span {
  display: inline;
}

/* ── Floating Chatbot Container ── */
.vidhi-chatbot-container {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 400px;
  max-width: calc(100vw - 40px);
  height: 600px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 9999;
  animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-family: 'Crimson Pro', Georgia, serif;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── Header ── */
.vidhi-header {
  background: var(--vidhi-ink);
  color: white;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid var(--vidhi-accent);
  flex-shrink: 0;
}

.vidhi-header-brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.vidhi-header-brand h3 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin: 0;
  font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.vidhi-header-brand span {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #a0a0b8;
  letter-spacing: 0.05em;
}

.vidhi-close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  transition: opacity 0.15s;
}

.vidhi-close-btn:hover {
  opacity: 0.7;
}

/* ── Messages Area ── */
.vidhi-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.vidhi-messages::-webkit-scrollbar {
  width: 6px;
}

.vidhi-messages::-webkit-scrollbar-track {
  background: transparent;
}

.vidhi-messages::-webkit-scrollbar-thumb {
  background: var(--vidhi-border);
  border-radius: 3px;
}

.vidhi-msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 85%;
  animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.vidhi-msg.user {
  align-self: flex-end;
  align-items: flex-end;
}

.vidhi-msg.bot {
  align-self: flex-start;
  align-items: flex-start;
}

.vidhi-msg-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--vidhi-muted);
  padding: 0 4px;
}

.vidhi-msg.user .vidhi-msg-meta {
  color: var(--vidhi-accent);
}

.vidhi-bubble {
  padding: 10px 14px;
  border-radius: 8px;
  line-height: 1.5;
  font-size: 14px;
}

.vidhi-msg.user .vidhi-bubble {
  background: var(--vidhi-ink);
  color: white;
  border-radius: 12px 12px 2px 12px;
  font-style: italic;
}

.vidhi-msg.bot .vidhi-bubble {
  background: #f5f5f5;
  color: var(--vidhi-ink);
  border-left: 3px solid var(--vidhi-accent);
  border-radius: 2px 12px 12px 12px;
}

/* ── Typing Indicator ── */
.vidhi-typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 10px 14px;
  background: #f5f5f5;
  border-left: 3px solid var(--vidhi-accent);
  border-radius: 2px 12px 12px 12px;
  width: fit-content;
}

.vidhi-typing span {
  width: 6px;
  height: 6px;
  background: var(--vidhi-accent);
  border-radius: 50%;
  animation: bounce 1s infinite;
  opacity: 0.6;
}

.vidhi-typing span:nth-child(2) {
  animation-delay: 0.15s;
}

.vidhi-typing span:nth-child(3) {
  animation-delay: 0.3s;
}

@keyframes bounce {
  0%,
  80%,
  100% {
    transform: translateY(0);
  }
  40% {
    transform: translateY(-5px);
  }
}

/* ── Input Area ── */
.vidhi-input-area {
  padding: 12px;
  background: white;
  border-top: 1px solid var(--vidhi-border);
  flex-shrink: 0;
}

.vidhi-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.vidhi-input {
  flex: 1;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 14px;
  padding: 10px 12px;
  background: #f9f9f9;
  border: 1px solid var(--vidhi-border);
  border-radius: 6px;
  color: var(--vidhi-ink);
  outline: none;
  transition: border-color 0.15s;
}

.vidhi-input:focus {
  border-color: var(--vidhi-accent);
  background: white;
}

.vidhi-input::placeholder {
  color: #b0a898;
  font-style: italic;
}

.vidhi-send-btn {
  width: 36px;
  height: 36px;
  font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 18px;
  font-weight: 700;
  background: var(--vidhi-accent);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.vidhi-send-btn:hover {
  background: #a93426;
  transform: scale(1.05);
}

.vidhi-send-btn:active {
  transform: scale(0.95);
}

/* ── Backdrop ── */
.vidhi-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 9997;
  animation: fadeIn 0.2s ease-in-out;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .vidhi-chatbot-container {
    bottom: 0 !important;
    right: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100vh;
    border-radius: 0;
    max-width: 100vw;
  }

  .vidhi-msg {
    max-width: 90%;
  }

  .vidhi-chat-button {
    bottom: 20px;
    right: 20px;
  }
}

/* ── Suggestion Links ── */
.vidhi-suggestion {
  display: inline-block;
  font-size: 12px;
  padding: 6px 10px;
  background: #efefef;
  border: 1px solid #ddd;
  border-radius: 4px;
  cursor: pointer;
  margin: 2px;
  transition: all 0.15s;
}

.vidhi-suggestion:hover {
  background: var(--vidhi-ink);
  color: white;
  border-color: var(--vidhi-ink);
}

/* ── Bill Card ── */
.vidhi-bill-card {
  background: white;
  border: 1px solid var(--vidhi-border);
  border-left: 4px solid var(--vidhi-teal);
  border-radius: 4px;
  padding: 10px 12px;
  margin: 4px 0;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}

.vidhi-bill-card:hover {
  border-left-color: var(--vidhi-accent);
  background: #fafafa;
  transform: translateX(2px);
}

.vidhi-bill-card-title {
  font-weight: 600;
  color: var(--vidhi-ink);
  margin-bottom: 4px;
}

.vidhi-bill-card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--vidhi-muted);
}

/* ── Status Badge ── */
.vidhi-status-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  margin-left: 4px;
  font-weight: 600;
}

.vidhi-status-assented {
  background: #d4edda;
  color: #155724;
}

.vidhi-status-pending {
  background: #fff3cd;
  color: #856404;
}

.vidhi-status-passed {
  background: #cce5ff;
  color: #004085;
}

.vidhi-status-lapsed {
  background: #e2e3e5;
  color: #383d41;
}

.vidhi-status-withdrawn {
  background: #f8d7da;
  color: #721c24;
}
</style>

<script>
  // Make sure fonts are loaded
  if (!document.querySelector('link[href*="Crimson+Pro"]')) {
    const link = document.createElement('link');
    link.href = 'https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap';
    link.rel = 'stylesheet';
    document.head.appendChild(link);
  }

  // Global widget controller
  window.vidhiWidget = {
    isOpen: false,
    messageCount: 0,

    toggleChat() {
      this.isOpen = !this.isOpen;
      const chatbox = document.getElementById('vidhi-chatbot');
      const backdrop = document.getElementById('vidhi-backdrop');
      const btn = document.getElementById('vidhi-chat-btn');

      if (this.isOpen) {
        chatbox.style.display = 'flex';
        backdrop.style.display = 'block';
        btn.innerHTML = '<span id="vidhi-btn-icon">↓</span><span id="vidhi-btn-text">Talking</span>';
        document.getElementById('vidhi-user-input').focus();
        
        // Initialize with greeting if first time
        if (this.messageCount === 0) {
          this.showGreeting();
        }
      } else {
        chatbox.style.display = 'none';
        backdrop.style.display = 'none';
        btn.innerHTML = '<span id="vidhi-btn-icon">💬</span><span id="vidhi-btn-text">Chat</span>';
      }
    },

    handleSend() {
      const input = document.getElementById('vidhi-user-input');
      const message = input.value.trim();
      if (!message) return;

      this.addMessage('user', message);
      input.value = '';
      this.showTyping();

      // Simulate API delay
      setTimeout(() => {
        this.removeTyping();
        const response = this.generateSimpleResponse(message);
        this.addMessage('bot', response);
      }, 500);
    },

    addMessage(role, text) {
      const messagesBox = document.getElementById('vidhi-messages');
      const msgEl = document.createElement('div');
      msgEl.className = `vidhi-msg ${role}`;

      const timestamp = new Date().toLocaleTimeString('en-IN', {
        hour: '2-digit',
        minute: '2-digit',
      });
      const meta = role === 'user' ? `You · ${timestamp}` : `Vidhi · ${timestamp}`;

      const metaEl = document.createElement('div');
      metaEl.className = 'vidhi-msg-meta';
      metaEl.textContent = meta;

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'vidhi-bubble';
      bubbleEl.textContent = text;

      msgEl.appendChild(metaEl);
      msgEl.appendChild(bubbleEl);
      messagesBox.appendChild(msgEl);
      messagesBox.scrollTop = messagesBox.scrollHeight;
      this.messageCount++;
    },

    showTyping() {
      const messagesBox = document.getElementById('vidhi-messages');
      const typingEl = document.createElement('div');
      typingEl.className = 'vidhi-msg bot';
      typingEl.id = 'vidhi-typing-indicator';
      typingEl.innerHTML = `<div class="vidhi-msg-meta">Vidhi · searching…</div><div class="vidhi-typing"><span></span><span></span><span></span></div>`;
      messagesBox.appendChild(typingEl);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    },

    removeTyping() {
      const typing = document.getElementById('vidhi-typing-indicator');
      if (typing) typing.remove();
    },

    showGreeting() {
      this.addMessage(
        'bot',
        'Namaste! 🇮🇳 I am Vidhi, your guide to Indian parliamentary bills and legislation. Ask me about any bill, law, policy, or regulatory changes. How can I assist you today?'
      );
    },

    generateSimpleResponse(query) {
      const q = query.toLowerCase();

      // Simple response generator for the widget (you can enhance this)
      if (q.includes('hello') || q.includes('hi') || q.includes('hey')) {
        return 'Hello! I am Vidhi, your AI assistant for Indian bills and legislation. Ask me about specific bills, laws, or policy topics!';
      }

      if (q.includes('about') || q.includes('help')) {
        return 'I can help you understand Indian parliamentary bills, acts, and policies. Try asking:\n• "What is the Lokpal Bill?"\n• "Recent consumer protection laws"\n• "Bills about environmental protection"\n• "How does a bill become law?"';
      }

      if (q.includes('bill') || q.includes('law') || q.includes('act')) {
        return 'I can search through thousands of Indian bills and acts. Please specify:\n• A bill name (e.g., "Criminal Law Amendment 2013")\n• A topic (e.g., "land acquisition", "labor rights")\n• A ministry or department\n• A year or time period';
      }

      if (q.includes('citizen') || q.includes('right') || q.includes('impact') || q.includes('affect')) {
        return '⚖️ Great question about citizen rights and impact. To give you practical advice, please tell me:\n• Which bill or law interests you?\n• Are you affected as an individual, business, or in another capacity?\n\nI can then explain implications and your legal protections.';
      }

      // Default response
      return 'I can help you understand Indian bills, laws, and policies. Ask me about:\n📋 Specific bills or acts\n🔍 Bills by topic, ministry, or year\n⚖️ Citizen rights and legal implications\n💼 Business or regulatory impacts\n\nWhat would you like to know?';
    },
  };

  // Initialize button click handler
  document.getElementById('vidhi-chat-btn').addEventListener('click', () => {
    window.vidhiWidget.toggleChat();
  });

  document.getElementById('vidhi-close-btn').addEventListener('click', () => {
    window.vidhiWidget.toggleChat();
  });
</script>
