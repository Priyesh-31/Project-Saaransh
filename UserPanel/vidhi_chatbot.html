<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidhi — Indian Parliamentary Bills Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d4a;
  --paper: #f7f4ef;
  --paper2: #eeebe4;
  --paper3: #e4e0d8;
  --accent: #c0392b;
  --accent2: #e74c3c;
  --gold: #b8860b;
  --gold2: #d4a017;
  --teal: #0f6674;
  --teal2: #1a8a9a;
  --green: #1e6b45;
  --muted: #7a7568;
  --border: #d4cfc6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--paper);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.hdr {
  background: var(--ink);
  color: var(--paper);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-shrink: 0;
  border-bottom: 3px solid var(--accent);
  min-height: 56px;
}
.hdr-brand { display: flex; align-items: baseline; gap: 10px; }
.hdr-brand h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.5px;
  color: var(--paper);
}
.hdr-brand span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #a0a0b8;
  letter-spacing: 0.05em;
}
.hdr-stats {
  display: flex;
  gap: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #a0a0b8;
}
.hdr-stats b { color: var(--gold2); }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  background: var(--ink2);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-section { padding: 0 14px 12px; }
.sidebar-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #6a6a88;
  margin-bottom: 8px;
  padding: 0 2px;
}
.chip-list { display: flex; flex-direction: column; gap: 3px; }
.chip {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 400;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  color: #c0bfe0;
  transition: all 0.15s;
  border: none;
  background: transparent;
  text-align: left;
  line-height: 1.3;
}
.chip:hover { background: rgba(255,255,255,0.08); color: #fff; }
.chip.active { background: var(--accent); color: #fff; }
.chip-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #6a6a88;
  float: right;
  margin-top: 1px;
}
.sidebar-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 8px 14px 12px;
}

/* ── Chat area ── */
.chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Message bubbles ── */
.msg { display: flex; flex-direction: column; gap: 4px; max-width: 820px; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.bot  { align-self: flex-start; align-items: flex-start; }

.msg-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 0 4px;
}
.msg.user .msg-meta { color: var(--accent); }

.bubble {
  padding: 14px 18px;
  border-radius: 2px;
  line-height: 1.7;
  font-size: 16px;
  position: relative;
}
.msg.user .bubble {
  background: var(--ink);
  color: var(--paper);
  border-radius: 2px 2px 0 2px;
  font-style: italic;
}
.msg.bot .bubble {
  background: white;
  color: var(--ink);
  border-left: 3px solid var(--accent);
  border-radius: 0 2px 2px 2px;
  box-shadow: 2px 2px 0 var(--paper3);
}

/* ── Bill cards ── */
.bills-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.bill-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-left: 4px solid var(--teal);
  border-radius: 2px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.bill-card:hover { border-left-color: var(--accent); background: #fff; transform: translateX(2px); }
.bill-card.assented { border-left-color: var(--green); }
.bill-card.pending  { border-left-color: var(--gold); }
.bill-card.lapsed   { border-left-color: var(--muted); }
.bill-card.withdrawn{ border-left-color: #999; }

.bill-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 6px;
}
.bill-title {
  font-family: 'Crimson Pro', serif;
  font-weight: 600;
  font-size: 15px;
  line-height: 1.35;
  color: var(--ink);
  flex: 1;
}
.bill-status {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.st-assented { background: #d4edda; color: #155724; }
.st-passed   { background: #cce5ff; color: #004085; }
.st-pending  { background: #fff3cd; color: #856404; }
.st-lapsed   { background: #e2e3e5; color: #383d41; }
.st-withdrawn{ background: #f8d7da; color: #721c24; }
.st-negatived{ background: #f8d7da; color: #721c24; }
.st-default  { background: #e2e3e5; color: #383d41; }

.bill-card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.bill-card-meta span { display: flex; align-items: center; gap: 4px; }
.domain-tag {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  margin: 2px 2px 0 0;
}

/* ── Bill detail view ── */
.detail-card {
  background: white;
  border: 1px solid var(--border);
  border-top: 4px solid var(--accent);
  border-radius: 2px;
  padding: 20px;
  margin-top: 8px;
}
.detail-title {
  font-family: 'Crimson Pro', serif;
  font-size: 20px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 12px;
  color: var(--ink);
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.detail-field { display: flex; flex-direction: column; gap: 2px; }
.detail-field label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.detail-field span {
  font-family: 'Crimson Pro', serif;
  font-size: 15px;
  color: var(--ink);
  font-weight: 600;
}

.detail-summary {
  background: var(--paper);
  border-left: 3px solid var(--gold);
  padding: 12px 16px;
  margin-bottom: 14px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink2);
}
.detail-summary h4 {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 6px;
}

.action-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.action-btn {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid currentColor;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: transparent;
}
.action-btn.primary { color: var(--accent); }
.action-btn.primary:hover { background: var(--accent); color: white; }
.action-btn.teal { color: var(--teal); }
.action-btn.teal:hover { background: var(--teal); color: white; }
.action-btn.gold { color: var(--gold); }
.action-btn.gold:hover { background: var(--gold); color: white; }
.action-btn.green { color: var(--green); }
.action-btn.green:hover { background: var(--green); color: white; }

/* ── Legal awareness box ── */
.legal-box {
  background: #fff8f0;
  border: 1px solid #f0c06a;
  border-left: 4px solid var(--gold);
  border-radius: 2px;
  padding: 14px 16px;
  margin-top: 10px;
}
.legal-box h4 {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 8px;
}
.legal-box ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.legal-box li {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink2);
  padding-left: 16px;
  position: relative;
}
.legal-box li::before {
  content: "›";
  position: absolute;
  left: 0;
  color: var(--gold);
  font-weight: bold;
}

/* ── Stats panel ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-top: 8px;
}
.stat-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 14px;
  text-align: center;
}
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
  display: block;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Suggested questions ── */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 10px;
}
.suggestion {
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  font-style: italic;
  padding: 7px 13px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 2px;
  cursor: pointer;
  color: var(--ink2);
  transition: all 0.15s;
}
.suggestion:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── Input area ── */
.input-area {
  padding: 16px 28px 20px;
  background: var(--paper2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 820px;
}
#user-input {
  flex: 1;
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  padding: 12px 16px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  color: var(--ink);
  resize: none;
  min-height: 48px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.5;
}
#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: #b0a898; font-style: italic; }
#send-btn {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 12px 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}
#send-btn:hover { background: var(--accent2); }
.input-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.03em;
}

/* ── Loader ── */
.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 14px 18px;
  background: white;
  border-left: 3px solid var(--accent);
  border-radius: 0 2px 2px 2px;
  width: fit-content;
}
.typing span {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1s infinite;
  opacity: 0.6;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

/* ── Misc ── */
.result-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }
.separator { height: 1px; background: var(--border); margin: 10px 0; }

@media (max-width: 640px) {
  .sidebar { display: none; }
  .messages { padding: 16px; }
  .input-area { padding: 12px 16px 16px; }
}
</style>
</head>

<header class="hdr">
  <div class="hdr-brand">
    <h1>VIDHI</h1>
    <span>Lok Sabha Bills Intelligence System · 1955–2013</span>
  </div>
  <div class="hdr-stats">
    <span><b id="stat-total">2713</b> bills</span>

</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Quick filters</div>
      <div class="chip-list" id="domain-filters"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Bill status</div>
      <div class="chip-list" id="status-filters"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Recent years</div>
      <div class="chip-list" id="year-filters"></div>
    </div>
  </aside>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" rows="1" placeholder="Ask about any bill — try: Criminal Law Amendment 2013, or bills about land acquisition, or Lokpal…"></textarea>
        <button id="send-btn" onclick="handleSend()">ASK →</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line · Click any bill card for full details</div>
    </div>
  </div>
</div>

// ── Search & filter engine ──────────────────────────────────────────────────
function normalise(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/,' ').trim(); }

function scoreMatch(bill, q){
  const t  = normalise(bill.t);
  const m  = normalise(bill.m||'');
  const d  = (bill.d||[]).map(normalise).join(' ');
  const qn = normalise(q);
  const terms = qn.split(' ').filter(x=>x.length>1);
  let score = 0;
  for(const term of terms){
    if(t.includes(term))    score += (t.startsWith(term)?5:3);
    if(m.includes(term))    score += 1;
    if(d.includes(term))    score += 1;
    if(bill.y===term)       score += 4;
    if((bill.n||'')===term) score += 5;
  }
  // Exact phrase bonus
  if(t.includes(qn)) score += 10;
  // Year range shorthand
  const ym = q.match(/\b(19|20)\d{2}\b/g);
  if(ym && ym.includes(bill.y)) score += 3;
  return score;
}

function search(query, filters={}){
  let results = BILLS;
  // Apply sidebar filters
  if(filters.domain) results = results.filter(b=>(b.d||[]).includes(filters.domain));
  if(filters.status) results = results.filter(b=>statusNorm(b.st)===filters.status);
  if(filters.year)   results = results.filter(b=>b.y===filters.year);
  if(query.trim()){
    results = results.map(b=>({b, s:scoreMatch(b,query)}))
                     .filter(x=>x.s>0)
                     .sort((a,z)=>z.s-a.s)
                     .map(x=>x.b);
  }
  return results;
}

function statusNorm(s){
  if(!s) return 'unknown';
  const l = s.toLowerCase().trim();
  if(l.includes('assent')) return 'assented';
  if(l.includes('passed')) return 'passed';
  if(l.includes('pend'))   return 'pending';
  if(l.includes('lapse'))  return 'lapsed';
  if(l.includes('withdr')) return 'withdrawn';
  if(l.includes('negat'))  return 'negatived';
  return 'unknown';
}

// ── Intent parser ───────────────────────────────────────────────────────────
function parseIntent(q){
  const l = q.toLowerCase();
  if(/^(hello|hi|hey|namaste|help)/.test(l)) return {type:'greeting'};
  if(/\b(stat|overview|summary|how many|count|total|breakdown)\b/.test(l)) return {type:'stats'};
  if(/\b(what is|explain|mean|define|tell me about)\b.*\b(money bill|financial bill|ordinary bill|constitutional)/.test(l)) return {type:'explain_category', q};
  if(/\b(legal|right|impact|affect|citizen|aware|implication|what should|can i|do i)\b/.test(l)) return {type:'legal_q', q};
  if(/\b(compare|vs|versus|difference between)\b/.test(l)) return {type:'compare', q};
  if(/\b(all|list|show all|find all)\b.*\b(pending|lapsed|passed|assented|withdrawn)\b/.test(l) ||
     /\b(pending|lapsed|passed|assented|withdrawn)\b.*\b(bills?)\b/.test(l)) return {type:'by_status', q};
  if(/\b(all bills?|list all|show all|every bill)\b.*\b(ministry|from|by|in|under)\b/.test(l) ||
     /\b(ministry|from|by|in|under)\b.*\b(bills?)\b/.test(l)) return {type:'by_ministry', q};
  if(/\b(20[0-9]{2}|19[5-9][0-9])\b/.test(l) && !/\b(bill|act|law|amendment)\b/.test(l)) return {type:'by_year', q};
  return {type:'search', q};
}

// ── Render helpers ──────────────────────────────────────────────────────────
function stClass(status){ return 'st-'+statusNorm(status); }
function stLabel(status){ return statusNorm(status).charAt(0).toUpperCase()+statusNorm(status).slice(1); }

function renderBillCard(b, idx){
  const sn = statusNorm(b.st);
  const domains = (b.d||[]).map(d=>`<span class="domain-tag">${d}</span>`).join('');
  const date = b.di ? (' · Introduced '+b.di) : '';
  const year = b.y || '';
  return `<div class="bill-card ${sn}" onclick="showBillDetail(${idx})" title="Click for full details">
    <div class="bill-card-top">
      <div class="bill-title">${b.t}</div>
      <span class="bill-status ${stClass(b.st)}">${stLabel(b.st)}</span>
    </div>
    <div class="bill-card-meta">
      <span>Bill No. ${b.n} · ${year}</span>
      ${b.m?`<span>${b.m}</span>`:''}
      <span>${b.cat||''}</span>
      ${b.act?`<span>Act No. ${b.act}</span>`:''}
    </div>
    <div style="margin-top:6px">${domains}</div>
  </div>`;
}

function renderBillDetail(b, idx){
  const sn = statusNorm(b.st);
  const catSummary = BILL_SUMMARIES[b.cat] || '';
  const legalTips  = LEGAL_AWARENESS[sn] || LEGAL_AWARENESS['passed'];
  const domains = (b.d||[]).map(d=>`<span class="domain-tag">${d}</span>`).join(' ');

  let domainExplainer = '';
  for(const dom of (b.d||[])){
    if(DOMAIN_EXPLAINERS[dom]){
      domainExplainer += `<p style="margin-top:8px;font-size:14px;color:var(--ink2)"><b style="font-family:DM Mono,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal)">${dom}</b><br>${DOMAIN_EXPLAINERS[dom]}</p>`;
      break;
    }
  }

  const urlBtn = b.url ? `<a class="action-btn teal" href="${b.url}" target="_blank">Read Full Bill PDF ↗</a>` : '';
  const pdfNote = b.url ? '' : `<p style="font-size:13px;font-family:DM Mono,monospace;color:var(--muted);margin-top:4px">PDF not available in this dataset for bills before 2005.</p>`;

  return `<div class="detail-card">
    <div class="detail-title">${b.t}</div>
    <div style="margin-bottom:12px">${domains}</div>
    <div class="detail-grid">
      <div class="detail-field"><label>Bill Number</label><span>No. ${b.n} of ${b.y}</span></div>
      <div class="detail-field"><label>Ministry</label><span>${b.m||'—'}</span></div>
      <div class="detail-field"><label>Category</label><span>${b.cat||'—'}</span></div>
      <div class="detail-field"><label>Status</label><span class="bill-status ${stClass(b.st)}" style="width:fit-content">${stLabel(b.st)}</span></div>
      <div class="detail-field"><label>Introduced</label><span>${b.di||'—'}</span></div>
      ${b.da?`<div class="detail-field"><label>Assent Date</label><span>${b.da}</span></div>`:''}
      ${b.act?`<div class="detail-field"><label>Act Number</label><span>Act No. ${b.act}</span></div>`:''}
    </div>
    <div class="separator"></div>
    ${catSummary?`<div class="detail-summary"><h4>What kind of bill is this?</h4>${catSummary}</div>`:''}
    ${domainExplainer?`<div class="detail-summary" style="border-left-color:var(--teal)">${domainExplainer}</div>`:''}
    <div class="legal-box">
      <h4>⚖ Your Legal Awareness — What this means for you</h4>
      <ul>${legalTips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="action-bar">
      ${urlBtn}
      <button class="action-btn primary" onclick="askFollowUp('Tell me the implications of ${b.t.replace(/'/g,"\'")} for ordinary citizens')">Citizen Impact</button>
      <button class="action-btn gold"    onclick="askFollowUp('Find bills related to ${(b.d||[''])[0] || b.t.split(' ').slice(0,4).join(' ')}')">Related Bills</button>
      <button class="action-btn green"   onclick="askFollowUp('What rights do I have under ${b.t.replace(/'/g,"\'")}?')">My Rights</button>
    </div>
    ${pdfNote}
  </div>`;
}

// ── Bill detail global store ─────────────────────────────────────────────
const DETAIL_CACHE = {};
function showBillDetail(idx){
  const b = BILLS[idx];
  const html = renderBillDetail(b, idx);
  addMessage('bot', html, false);
}

// ── Response generator ──────────────────────────────────────────────────────
function generateResponse(query, filters={}){
  const intent = parseIntent(query);

  if(intent.type==='greeting'){
    return `<p>Namaste. I am <b>Vidhi</b> — your guide to Indian parliamentary legislation from 1955 to 2013.</p>
<p style="margin-top:8px">I have knowledge of <b>2,713 Lok Sabha Government Bills</b> across 59 years and 40+ ministries. I can help you:</p>
<div class="suggestions">
  <div class="suggestion" onclick="handleQ(this.textContent)">Find the Lokpal Bill</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">Criminal Law Amendment 2013</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">All pending bills in 2013</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">Land acquisition bills</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">Bills that lapsed</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">Show me statistics</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">What is a Money Bill?</div>
  <div class="suggestion" onclick="handleQ(this.textContent)">Finance bills 2010 to 2013</div>
</div>`;
  }

  if(intent.type==='stats'){
    const total  = BILLS.length;
    const passed = BILLS.filter(b=>['passed','assented'].includes(statusNorm(b.st))).length;
    const pend   = BILLS.filter(b=>statusNorm(b.st)==='pending').length;
    const lapsed = BILLS.filter(b=>statusNorm(b.st)==='lapsed').length;
    const withd  = BILLS.filter(b=>statusNorm(b.st)==='withdrawn').length;
    const minSet = [...new Set(BILLS.map(b=>b.m).filter(Boolean))];
    const yearSet= [...new Set(BILLS.map(b=>b.y).filter(Boolean))];
    return `<p>Here is an overview of the Lok Sabha Bills dataset:</p>
<div class="stats-grid" style="margin-top:12px">
  <div class="stat-card"><span class="stat-num">${total.toLocaleString()}</span><span class="stat-label">Total Bills</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--teal)">${passed.toLocaleString()}</span><span class="stat-label">Passed / Assented</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--gold)">${pend}</span><span class="stat-label">Pending</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--muted)">${lapsed}</span><span class="stat-label">Lapsed</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--accent)">${withd}</span><span class="stat-label">Withdrawn</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--ink)">${yearSet.length}</span><span class="stat-label">Years Covered</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--teal2)">${minSet.length}</span><span class="stat-label">Ministries</span></div>
  <div class="stat-card"><span class="stat-num" style="color:var(--green)">${BILLS.filter(b=>b.url).length}</span><span class="stat-label">Bills with PDF</span></div>
</div>
<p style="margin-top:14px;font-size:14px;color:var(--muted)">Data covers 1955–2013. Ask me to filter by ministry, year, domain, or status.</p>`;
  }

  if(intent.type==='explain_category'){
    const q = intent.q.toLowerCase();
    for(const [cat, explanation] of Object.entries(BILL_SUMMARIES)){
      if(q.includes(cat.toLowerCase())){
        return `<div class="detail-summary" style="border-left-color:var(--teal);margin:0">
          <h4 style="color:var(--teal)">${cat} — Explained</h4>
          <p>${explanation}</p>
        </div>
        <div class="suggestions" style="margin-top:10px">
          <div class="suggestion" onclick="handleQ('Show me examples of ${cat}')">Show examples</div>
          <div class="suggestion" onclick="handleQ('Pending ${cat}s')">Pending ${cat}s</div>
        </div>`;
      }
    }
  }

  if(intent.type==='legal_q'){
    const results = search(query, filters).slice(0,3);
    if(!results.length) return `<p>I couldn't find specific bills matching your legal question. Try rephrasing with a bill name or topic.</p>`;
    const indices = results.map(b=>BILLS.indexOf(b));
    let html = `<p>Here are the most relevant bills for your query, with legal context:</p><div class="bills-grid">`;
    results.forEach((b,i)=>{ html += renderBillCard(b, indices[i]); });
    html += `</div>`;
    const sn = statusNorm(results[0].st);
    const tips = LEGAL_AWARENESS[sn]||LEGAL_AWARENESS['passed'];
    html += `<div class="legal-box" style="margin-top:10px"><h4>⚖ General Legal Awareness</h4><ul>${tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
    return html;
  }

  // Default: search
  const results = search(query, filters);
  if(!results.length){
    return `<p>No bills found matching "<em>${query}</em>".</p>
<p style="margin-top:8px;font-size:14px;color:var(--muted)">Try different keywords — bill topic, ministry name, year, or status (pending/passed/lapsed).</p>
<div class="suggestions">
  <div class="suggestion" onclick="handleQ('pending bills 2013')">Pending 2013</div>
  <div class="suggestion" onclick="handleQ('Finance Ministry bills')">Finance bills</div>
  <div class="suggestion" onclick="handleQ('criminal law bills')">Criminal law</div>
</div>`;
  }

  const shown = results.slice(0,12);
  const indices = shown.map(b=>BILLS.indexOf(b));
  const more = results.length - shown.length;

  let html = `<p class="result-count">Found <b>${results.length}</b> bill${results.length!==1?'s':''} matching "<em>${query}</em>"${more>0?` · showing top 12`:''}</p>`;
  html += `<div class="bills-grid">`;
  shown.forEach((b,i)=>{ html += renderBillCard(b, indices[i]); });
  html += `</div>`;

  if(more>0){
    html += `<p style="margin-top:10px;font-size:13px;font-family:DM Mono,monospace;color:var(--muted)">${more} more results — refine your search to narrow down.</p>`;
  }

  // Add legal awareness if result set is small
  if(results.length<=3 && results.length>0){
    const sn = statusNorm(results[0].st);
    const tips = LEGAL_AWARENESS[sn]||LEGAL_AWARENESS['passed'];
    html += `<div class="legal-box" style="margin-top:10px"><h4>⚖ Legal Awareness</h4><ul>${tips.slice(0,2).map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
    html += `<div class="suggestions" style="margin-top:8px">
      <div class="suggestion" onclick="showBillDetail(${indices[0]})">Full details & your rights</div>
      <div class="suggestion" onclick="askFollowUp('Find bills related to ${(results[0].d||[''])[0]||results[0].t.split(' ').slice(0,4).join(' ')}')">Find related bills</div>
    </div>`;
  }
  return html;
}

// ── Active filters ──────────────────────────────────────────────────────────
let activeFilters = {};

// ── Chat engine ─────────────────────────────────────────────────────────────
let msgCount = 0;
function addMessage(role, html, isHTML=true){
  const box = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg '+role;
  const ts = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const meta = role==='user'?'You · '+ts:'Vidhi · '+ts;
  if(isHTML){
    el.innerHTML = `<div class="msg-meta">${meta}</div><div class="bubble">${html}</div>`;
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    el.appendChild(Object.assign(document.createElement('div'),{className:'msg-meta',textContent:meta}));
    el.appendChild(bubble);
  }
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  msgCount++;
}

function showTyping(){
  const box = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-meta">Vidhi · searching…</div><div class="typing"><span></span><span></span><span></span></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function removeTyping(){ document.getElementById('typing-indicator')?.remove(); }

function handleQ(q){
  addMessage('user', q, false);
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const resp = generateResponse(q, activeFilters);
    addMessage('bot', resp);
  }, 320);
}

function handleSend(){
  const el = document.getElementById('user-input');
  const q = el.value.trim();
  if(!q) return;
  el.value = '';
  el.style.height = '';
  handleQ(q);
}

function askFollowUp(q){
  document.getElementById('user-input').value = q;
  handleSend();
}

// ── Sidebar filters ─────────────────────────────────────────────────────────
function buildSidebar(){
  // Domains
  const domainCounts = {};
  BILLS.forEach(b=>(b.d||[]).forEach(d=>{ domainCounts[d]=(domainCounts[d]||0)+1; }));
  const domains = Object.entries(domainCounts).sort((a,z)=>z[1]-a[1]).slice(0,10);
  const df = document.getElementById('domain-filters');
  domains.forEach(([d,c])=>{
    const btn = document.createElement('button');
    btn.className='chip';
    btn.innerHTML=`${d}<span class="chip-count">${c}</span>`;
    btn.onclick=()=>toggleFilter('domain',d,btn);
    df.appendChild(btn);
  });

  // Status
  const statusList = [['Passed','passed'],['Pending','pending'],['Assented','assented'],['Lapsed','lapsed'],['Withdrawn','withdrawn']];
  const sf = document.getElementById('status-filters');
  statusList.forEach(([label,val])=>{
    const count = BILLS.filter(b=>statusNorm(b.st)===val).length;
    if(!count) return;
    const btn = document.createElement('button');
    btn.className='chip';
    btn.innerHTML=`${label}<span class="chip-count">${count}</span>`;
    btn.onclick=()=>toggleFilter('status',val,btn);
    sf.appendChild(btn);
  });

  // Recent years
  const yf = document.getElementById('year-filters');
  const recentYears = [...new Set(BILLS.map(b=>b.y).filter(Boolean))].sort((a,z)=>z-a).slice(0,12);
  recentYears.forEach(y=>{
    const count = BILLS.filter(b=>b.y===y).length;
    const btn = document.createElement('button');
    btn.className='chip';
    btn.innerHTML=`${y}<span class="chip-count">${count}</span>`;
    btn.onclick=()=>toggleFilter('year',y,btn);
    yf.appendChild(btn);
  });
}

function toggleFilter(type, val, btn){
  if(activeFilters[type]===val){
    delete activeFilters[type];
    btn.classList.remove('active');
    addMessage('bot', `<p>Cleared ${type} filter. All bills are now searchable.</p>`);
  } else {
    // Remove previous active for this type
    document.querySelectorAll(`#${type}-filters .chip.active`).forEach(b=>b.classList.remove('active'));
    activeFilters[type] = val;
    btn.classList.add('active');
    const results = search('', activeFilters);
    addMessage('bot', `<p>Filtered to <b>${results.length} bills</b> with ${type}: <em>${val}</em>. Now type a search or ask a question within this filter.</p>
<div class="suggestions">
  <div class="suggestion" onclick="handleQ('Show all')">Show all ${Math.min(results.length,12)}</div>
  <div class="suggestion" onclick="handleQ('List them by ministry')">By ministry</div>
  <div class="suggestion" onclick="handleQ('Most recent ones')">Most recent</div>
</div>`);
  }
}

// ── Auto-resize textarea ────────────────────────────────────────────────────
document.getElementById('user-input').addEventListener('input', function(){
  this.style.height=''; this.style.height=Math.min(this.scrollHeight,120)+'px';
});
document.getElementById('user-input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});
